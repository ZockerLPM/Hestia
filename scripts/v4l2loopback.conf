# /etc/modprobe.d/v4l2loopback.conf
# Hestia: virtuelles V4L2-Capture-Device, das die libcamera-Pipeline
# Chromium-tauglich macht.
#
# video_nr=40       — /dev/video40 (höher als alle libcamera-internen
#                     Nodes 0–31, vermeidet Kollisionen bei kernel-Updates)
# card_label        — wird Chromium als "HestiaCam" in der Device-Liste
#                     angezeigt, leicht wiedererkennbar
# exclusive_caps=1  — versteckt das parallele OUTPUT-Cap, sodass das
#                     Device als reines Capture-Device erscheint —
#                     Chromium wird sonst durcheinander
options v4l2loopback video_nr=40 card_label="HestiaCam" exclusive_caps=1
