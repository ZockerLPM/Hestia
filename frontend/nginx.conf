server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Pantry-/Rezept-Fotos können > 1 MB werden
    client_max_body_size 20m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm text/xml application/xml;

    # Statische Assets — lang cachen (vite hängt Hashes an die Dateinamen)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # face-api Modelle (~7 MB) — aggressiv cachen, sind versioniert via Manifest
    location /models/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    location /socket.io/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        # Wand-Display: lange offene WS-Verbindung, kein Idle-Timeout
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
